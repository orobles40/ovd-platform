# OVD Platform — OpenTelemetry Collector config
# Recibe trazas/metricas del fork TypeScript, OVD Engine y MCP servers
# Exporta a PostgreSQL (almacenamiento local) y opcionalmente a Grafana Cloud

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  # Health check del propio collector
  prometheus:
    config:
      scrape_configs:
        - job_name: otel-collector
          scrape_interval: 30s
          static_configs:
            - targets: ["localhost:8888"]

processors:
  batch:
    timeout: 5s
    send_batch_size: 1000

  # Filtrar datos sensibles antes de exportar
  attributes:
    actions:
      - key: db.statement
        action: delete   # no exportar queries SQL completas
      - key: http.request.body
        action: delete

  memory_limiter:
    check_interval: 1s
    limit_mib: 256

exporters:
  # Debug local — muestra trazas en logs del collector
  debug:
    verbosity: basic

  # PostgreSQL via OTLP (almacenamiento local)
  # TODO TASK-TEL: configurar exportador PostgreSQL cuando este disponible
  # otlphttp/postgres:
  #   endpoint: http://postgres:5432

  # Grafana Cloud (opcional — descomentar en produccion)
  # otlphttp/grafana:
  #   endpoint: ${GRAFANA_OTLP_ENDPOINT}
  #   headers:
  #     authorization: Basic ${GRAFANA_TOKEN}

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  pprof:
    endpoint: 0.0.0.0:1777

service:
  extensions: [health_check, pprof]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, attributes, batch]
      exporters: [debug]
    metrics:
      receivers: [otlp, prometheus]
      processors: [memory_limiter, batch]
      exporters: [debug]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [debug]
