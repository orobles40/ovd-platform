# OVD Platform — Virtual host producción
# Copyright 2026 Omar Robles
#
# Sustituir YOUR_DOMAIN por el dominio real antes de desplegar.
# Ejemplo: api.ovd.omarrobles.devoud

# ---------------------------------------------------------------------------
# Upstream: OVD Bridge (Bun/Hono)
# ---------------------------------------------------------------------------
upstream ovd_bridge {
    server ovd-bridge:4096;
    keepalive 32;
}

# ---------------------------------------------------------------------------
# HTTP → HTTPS redirect + ACME challenge para Let's Encrypt
# ---------------------------------------------------------------------------
server {
    listen 80;
    server_name YOUR_DOMAIN;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Health check interno (para docker healthcheck del nginx)
server {
    listen 80 default_server;
    server_name _;

    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}

# ---------------------------------------------------------------------------
# HTTPS — API principal
# ---------------------------------------------------------------------------
server {
    listen 443 ssl;
    http2  on;
    server_name YOUR_DOMAIN;

    # Certificados Let's Encrypt (certbot)
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    # Parámetros TLS seguros (Mozilla Intermediate)
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;
    ssl_stapling              on;
    ssl_stapling_verify       on;

    # Headers de seguridad
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           DENY always;
    add_header X-Content-Type-Options    nosniff always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header X-Request-ID              $request_id always;

    # ---------------------------------------------------------------------------
    # /auth/* — rate limiting estricto (login/register)
    # ---------------------------------------------------------------------------
    location /auth/ {
        limit_req zone=auth burst=10 nodelay;
        limit_req_status 429;

        proxy_pass         http://ovd_bridge;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   X-Request-ID      $request_id;
    }

    # ---------------------------------------------------------------------------
    # /ovd/sessions/*/events — SSE (sin buffering, timeout largo)
    # ---------------------------------------------------------------------------
    location ~ ^/ovd/sessions/[^/]+/events$ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass             http://ovd_bridge;
        proxy_http_version     1.1;
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto https;
        proxy_set_header       X-Request-ID      $request_id;

        # SSE: no buffering, flush inmediato
        proxy_buffering        off;
        proxy_cache            off;
        proxy_read_timeout     600s;
        chunked_transfer_encoding on;

        add_header Cache-Control no-cache always;
        add_header X-Accel-Buffering no always;
    }

    # ---------------------------------------------------------------------------
    # /docs y /openapi.json — sin autenticación
    # ---------------------------------------------------------------------------
    location ~ ^/(docs|openapi\.json)$ {
        proxy_pass         http://ovd_bridge;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto https;
    }

    # ---------------------------------------------------------------------------
    # /* — API general
    # ---------------------------------------------------------------------------
    location / {
        limit_req zone=api burst=60 delay=30;
        limit_req_status 429;

        proxy_pass         http://ovd_bridge;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   X-Request-ID      $request_id;
    }
}
