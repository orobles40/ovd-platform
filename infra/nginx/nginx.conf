# Configuración principal. Los bloques server van en conf.d/ovd.conf

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Formato de log con request id
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" reqid=$request_id';

    access_log  /var/log/nginx/access.log  main;

    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    server_tokens      off;

    # Compresión
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               application/x-font-ttf font/opentype image/svg+xml;

    # Rate limiting — 30 req/s por IP (burst 60 con delay)
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;

    # Tamaño máximo de body (feature request puede ser largo)
    client_max_body_size 4m;

    # Timeouts para SSE (stream largo)
    proxy_read_timeout     300s;
    proxy_connect_timeout  10s;
    proxy_send_timeout     60s;

    include /etc/nginx/conf.d/*.conf;
}
