# OVD Platform — CI Pipeline
# Se ejecuta en cada PR hacia main y en cada push a main.
# Usa runners estandar de GitHub (no depende de runners privados del upstream).
#
# Jobs:
#   typecheck        — tsc sin emitir, verifica tipos del fork
#   unit             — bun test con postgres real (aislamiento multi-tenant)
#   tenant-isolation — tests de aislamiento de datos entre orgs
#   docker-validate  — docker compose config validate
#   ovd-fork-check   — compliance Apache 2.0 (CREDITS.md, no secrets)
#   build-binary     — build del binario standalone (solo en tag v* o workflow_dispatch)
#   docker-build     — imagen OVD Engine a GHCR (solo en push a main o tag)

name: OVD CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read
  packages: write

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun turbo typecheck

  unit:
    name: Unit tests (con PostgreSQL)
    runs-on: ubuntu-latest
    needs: typecheck
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: ovd_test
          POSTGRES_USER: ovd_test
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://ovd_test:test_password@localhost:5432/ovd_test
      NODE_ENV: test
      JWT_SECRET: test_secret_for_ci_only_min_32_chars_12345
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Configure git identity
        run: |
          git config --global user.email "ci@omarrobles.dev"
          git config --global user.name "OVD CI"

      - name: Apply Drizzle migrations
        run: |
          cd packages/opencode
          bun run db:generate || true
          bun run db:migrate || true
        continue-on-error: true

      - name: Run unit tests
        run: bun turbo test

  tenant-isolation:
    name: Tests aislamiento multi-tenant
    runs-on: ubuntu-latest
    needs: typecheck
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: ovd_isolation_test
          POSTGRES_USER: ovd_test
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://ovd_test:test_password@localhost:5432/ovd_isolation_test
      NODE_ENV: test
      JWT_SECRET: test_secret_for_ci_only_min_32_chars_12345
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Apply tenant schema migrations
        run: |
          cd packages/opencode
          bun run db:generate || true
          bun run db:migrate || true
        continue-on-error: true

      - name: Run tenant isolation tests
        run: |
          cd packages/opencode
          bun test src/tenant/tenant.test.ts --timeout 30000

  docker-validate:
    name: Docker Compose validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: docker compose config --quiet
        env:
          ANTHROPIC_API_KEY: placeholder
          OVD_ENGINE_SECRET: placeholder
          ORACLE_CAS_DSN: placeholder
          ORACLE_CAS_USER: placeholder
          ORACLE_CAS_PASSWORD: placeholder
          ORACLE_CAT_DSN: placeholder
          ORACLE_CAT_USER: placeholder
          ORACLE_CAT_PASSWORD: placeholder
          ORACLE_CAV_DSN: placeholder
          ORACLE_CAV_USER: placeholder
          ORACLE_CAV_PASSWORD: placeholder
          NATS_URL: nats://localhost:4222
          DATABASE_URL: postgresql://ovd:ovd@localhost:5432/ovd

  ovd-fork-check:
    name: Fork compliance check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check CREDITS.md exists
        run: test -f CREDITS.md || (echo "CREDITS.md faltante — requerido por Apache 2.0" && exit 1)

      - name: Check .env.example exists
        run: test -f .env.example || (echo ".env.example faltante" && exit 1)

      - name: Check .env.local is not committed
        run: |
          if git ls-files --error-unmatch .env.local 2>/dev/null; then
            echo "ERROR: .env.local no debe estar commiteado (contiene credenciales)"
            exit 1
          fi
          echo "OK: .env.local no esta en el repositorio"

      - name: Check no hardcoded secrets pattern
        run: |
          if grep -rE "(api_key|secret|password)\\s*=\\s*[\x27\x22][^\x27\x22]{8,}[\x27\x22]" \
            --include="*.ts" --include="*.js" \
            --exclude-dir=node_modules --exclude-dir=".git" \
            --exclude="*.test.*" --exclude="*.spec.*" . ; then
            echo "WARNING: posibles credenciales hardcodeadas — revisar manualmente"
          fi
          echo "Secret scan completado"

      - name: Verify OVD modules have copyright headers
        run: |
          MISSING=0
          for f in $(find packages/opencode/src/ovd/ packages/opencode/src/tenant/ src/engine/ -name "*.ts" -o -name "*.py" 2>/dev/null); do
            if ! grep -q "Copyright 2026 Omar Robles" "$f"; then
              echo "FALTA header copyright: $f"
              MISSING=$((MISSING + 1))
            fi
          done
          if [ "$MISSING" -gt 0 ]; then
            echo "ERROR: $MISSING archivos sin header de copyright"
            exit 1
          fi
          echo "OK: todos los archivos OVD tienen header de copyright"

  build-binary:
    name: Build binario standalone
    runs-on: ubuntu-latest
    needs: [unit, tenant-isolation, docker-validate, ovd-fork-check]
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build TypeScript
        run: bun turbo build

      - name: Compile binario Bun (Linux x64)
        run: |
          mkdir -p dist
          bun build packages/opencode/src/cli/index.ts \
            --compile \
            --target bun-linux-x64 \
            --outfile dist/ovd-platform-linux-x64
          ls -lh dist/

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ovd-platform-linux-x64
          path: dist/ovd-platform-linux-x64
          retention-days: 14

  docker-build:
    name: Build y push imagen OVD Engine
    runs-on: ubuntu-latest
    needs: [unit, docker-validate]
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/omarrobles/ovd-engine
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Build y push OVD Engine
        uses: docker/build-push-action@v5
        with:
          context: src/engine
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
