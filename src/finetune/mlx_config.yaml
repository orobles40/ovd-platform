# OVD Platform — MLX Fine-tuning config
# Modelo: Qwen2.5-Coder-7B-Instruct-4bit
# Dataset: 312 ejemplos (avg 1065 tokens)
# Hardware: M1 Pro 16 GB

model: "models/qwen2.5-coder-7b-4bit"
data: "data/mlx"
train: true
seed: 42

# Training
batch_size: 1          # reducido de 2 para evitar OOM en M1 Pro 16 GB
iters: 500
learning_rate: 1.0e-4
warmup: 50
weight_decay: 0.01
grad_checkpoint: true   # crítico para 16 GB

# Evaluación
val_batches: 20
steps_per_report: 25
steps_per_eval: 100
save_every: 25          # checkpoint cada 25 iters (antes: 100) para no perder progreso

# LoRA
lora_layers: 16
lora_parameters:
  rank: 16
  alpha: 32
  dropout: 0.1
  scale: 10.0

# Dataset
mask_prompt: true
max_seq_length: 1024   # reducido de 2048 por RAM; algunos ejemplos llegan hasta 1934 tokens y se truncan

# Salida
adapter_path: "adapters"
