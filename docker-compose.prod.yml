# OVD Platform — Docker Compose Producción
# Copyright 2026 Omar Robles
#
# Uso:
#   docker compose -f docker-compose.prod.yml up -d
#
# Requiere secrets pre-creados (ver docs/DEPLOYMENT.md):
#   docker secret create anthropic_api_key -
#   docker secret create db_password -
#   docker secret create ovd_engine_secret -
#   docker secret create jwt_secret -
#   docker secret create ovd_webhook_signing_key -
#
# Variables de entorno (no secretas) en .env.prod — copiar de .env.prod.example

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL 16 + pgvector
  # ---------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ovd-postgres
    restart: always
    environment:
      POSTGRES_DB: ovd_prod
      POSTGRES_USER: ovd_prod
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - ovd-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ovd_prod -d ovd_prod"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
        reservations:
          memory: 256m

  # ---------------------------------------------------------------------------
  # NATS JetStream
  # ---------------------------------------------------------------------------
  nats:
    image: nats:2.10-alpine
    container_name: ovd-nats
    restart: always
    command: ["-js", "-m", "8222", "--max_payload", "8MB"]
    volumes:
      - nats_data:/data
    networks:
      - ovd-internal
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"

  # ---------------------------------------------------------------------------
  # OpenTelemetry Collector
  # ---------------------------------------------------------------------------
  otel:
    image: otel/opentelemetry-collector-contrib:0.96.0
    container_name: ovd-otel
    restart: always
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./infra/otel/config.yaml:/etc/otel/config.yaml:ro
    networks:
      - ovd-internal
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:13133/"]
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.25"

  # ---------------------------------------------------------------------------
  # OVD Engine (LangGraph + Python)
  # ---------------------------------------------------------------------------
  ovd-engine:
    image: ovd-engine:${OVD_ENGINE_VERSION:-latest}
    container_name: ovd-engine
    restart: always
    build:
      context: ./src/engine
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://ovd_prod:PLACEHOLDER@postgres:5432/ovd_prod
      NATS_URL: nats://nats:4222
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel:4318
      OTEL_SERVICE_NAME: ovd-engine
      OVD_MODEL: ${OVD_MODEL:-claude-sonnet-4-6}
      PORT: "8001"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LANGCHAIN_TRACING_V2: ${LANGCHAIN_TRACING_V2:-false}
      LANGCHAIN_API_KEY: ${LANGCHAIN_API_KEY:-}
      LANGCHAIN_PROJECT: ${LANGCHAIN_PROJECT:-ovd-platform-prod}
      LANGCHAIN_ENDPOINT: ${LANGCHAIN_ENDPOINT:-https://api.smith.langchain.com}
      OVD_RAG_EMBEDDING_PROVIDER: ${OVD_RAG_EMBEDDING_PROVIDER:-openai}
    secrets:
      - anthropic_api_key
      - db_password
      - ovd_engine_secret
    networks:
      - ovd-internal
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"
        reservations:
          memory: 512m
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
        window: 60s

  # ---------------------------------------------------------------------------
  # OVD Bridge (Bun / Hono — API + SSE)
  # ---------------------------------------------------------------------------
  ovd-bridge:
    image: ovd-bridge:${OVD_BRIDGE_VERSION:-latest}
    container_name: ovd-bridge
    restart: always
    build:
      context: .
      dockerfile: packages/opencode/Dockerfile
    environment:
      OVD_ENGINE_URL: http://ovd-engine:8001
      NATS_URL: nats://nats:4222
      DATABASE_URL: postgresql://ovd_prod:PLACEHOLDER@postgres:5432/ovd_prod
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel:4318
      OTEL_SERVICE_NAME: ovd-bridge
      PORT: "4096"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NODE_ENV: production
      OVD_QA_ALERT_THRESHOLD: ${OVD_QA_ALERT_THRESHOLD:-70}
    secrets:
      - jwt_secret
      - db_password
      - ovd_engine_secret
      - ovd_webhook_signing_key
    networks:
      - ovd-internal
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      ovd-engine:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4096/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
        reservations:
          memory: 256m
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 60s

  # ---------------------------------------------------------------------------
  # Nginx — Reverse proxy TLS (HTTPS)
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: ovd-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    networks:
      - ovd-internal
    depends_on:
      ovd-bridge:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.25"

secrets:
  anthropic_api_key:
    external: true
  db_password:
    external: true
  ovd_engine_secret:
    external: true
  jwt_secret:
    external: true
  ovd_webhook_signing_key:
    external: true

volumes:
  postgres_data:
    driver: local
  nats_data:
    driver: local
  certbot_www:
    driver: local

networks:
  ovd-internal:
    name: ovd-prod-network
    driver: bridge
    internal: false
