# OVD Platform — Docker Compose Producción
# Copyright 2026 Omar Robles
#
# Arquitectura:
#   postgres      — PostgreSQL 16 + pgvector
#   ovd-engine    — FastAPI + LangGraph (puerto interno 8001)
#   ovd-dashboard — React + nginx estático (puerto interno 80)
#   caddy         — Reverse proxy con TLS automático (puertos 80/443)
#
# Secrets requeridos (crear antes del primer deploy):
#   echo "TU_PASS_DB"       | docker secret create db_password -
#   echo "TU_ANTHROPIC_KEY" | docker secret create anthropic_api_key -
#   echo "TU_ENGINE_SECRET" | docker secret create ovd_engine_secret -
#
# Variables de entorno (no secretas):
#   cp .env.prod.example .env.prod
#   # Editar .env.prod con los valores de producción
#
# Primer deploy:
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
#
# Logs:
#   docker compose -f docker-compose.prod.yml logs -f ovd-engine

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL 16 + pgvector
  # ---------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ovd-postgres
    restart: always
    environment:
      POSTGRES_DB: ovd_prod
      POSTGRES_USER: ovd_prod
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init_prod.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - ovd-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ovd_prod -d ovd_prod"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
        reservations:
          memory: 256m

  # ---------------------------------------------------------------------------
  # OVD Engine (FastAPI + LangGraph)
  # El entrypoint ejecuta: alembic upgrade head → seed_prod.sql → uvicorn
  # ---------------------------------------------------------------------------
  ovd-engine:
    image: ovd-engine:${OVD_ENGINE_VERSION:-latest}
    container_name: ovd-engine
    restart: always
    build:
      context: ./src/engine
      dockerfile: Dockerfile
    environment:
      # DATABASE_URL con PLACEHOLDER — el entrypoint sustituye con el secret
      DATABASE_URL: postgresql://ovd_prod:PLACEHOLDER@postgres:5432/ovd_prod
      OVD_ENGINE_SECRET: ""          # cargado desde secret por entrypoint
      ANTHROPIC_API_KEY: ""          # cargado desde secret por entrypoint
      # LLM
      OVD_MODEL: ${OVD_MODEL:-claude-sonnet-4-6}
      OVD_MODEL_ANALYZER: ${OVD_MODEL_ANALYZER:-}
      OVD_MODEL_SDD: ${OVD_MODEL_SDD:-}
      OVD_MODEL_QA: ${OVD_MODEL_QA:-}
      OVD_LLM_TIMEOUT_SECS: ${OVD_LLM_TIMEOUT_SECS:-300}
      # Ollama (RunPod RTX 4090 on-demand — Config B)
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-}
      OVD_RAG_EMBEDDING_PROVIDER: ${OVD_RAG_EMBEDDING_PROVIDER:-openai}
      OVD_EMBED_MODEL: ${OVD_EMBED_MODEL:-text-embedding-3-small}
      # CORS — orígenes permitidos para el dashboard web
      OVD_CORS_ORIGINS: ${OVD_CORS_ORIGINS:-https://ovd.omarrobles.dev,http://localhost:5173}
      # Observabilidad
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LANGCHAIN_TRACING_V2: ${LANGCHAIN_TRACING_V2:-false}
      LANGCHAIN_API_KEY: ${LANGCHAIN_API_KEY:-}
      LANGCHAIN_PROJECT: ${LANGCHAIN_PROJECT:-ovd-platform-prod}
      LANGCHAIN_ENDPOINT: ${LANGCHAIN_ENDPOINT:-https://api.smith.langchain.com}
    secrets:
      - anthropic_api_key
      - db_password
      - ovd_engine_secret
      - openai_api_key
    networks:
      - ovd-internal
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"
        reservations:
          memory: 512m
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
        window: 60s

  # ---------------------------------------------------------------------------
  # OVD Dashboard (React + nginx estático)
  # Build con bun, servido por nginx:1.27-alpine
  # ---------------------------------------------------------------------------
  ovd-dashboard:
    image: ovd-dashboard:${OVD_DASHBOARD_VERSION:-latest}
    container_name: ovd-dashboard
    restart: always
    build:
      context: ./src/dashboard
      dockerfile: Dockerfile
      args:
        # URL pública del engine — Caddy rutea /api/* y /auth/* al engine
        VITE_API_URL: ${VITE_API_URL:-https://ovd.omarrobles.dev}
    networks:
      - ovd-internal
    depends_on:
      ovd-engine:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health.txt"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.25"

  # ---------------------------------------------------------------------------
  # Caddy — Reverse proxy con TLS automático (Let's Encrypt)
  # C09: configurar DOMAIN en .env.prod antes de activar TLS
  # ---------------------------------------------------------------------------
  caddy:
    image: caddy:2.9-alpine
    container_name: ovd-caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3 QUIC
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    networks:
      - ovd-internal
    depends_on:
      ovd-engine:
        condition: service_healthy
      ovd-dashboard:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health.txt"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.25"

  # ---------------------------------------------------------------------------
  # Backup diario PostgreSQL (C07.B)
  # Ejecuta pg_dump a las 02:00 UTC, guarda en volumen backup_data,
  # retiene los últimos 30 archivos (≈1 mes).
  # ---------------------------------------------------------------------------
  ovd-backup:
    image: postgres:16-alpine
    container_name: ovd-backup
    restart: always
    environment:
      PGPASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password
    volumes:
      - backup_data:/backups
    networks:
      - ovd-internal
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: >
      sh -c '
        while true; do
          sleep $$(( $(date -u +%s) % 86400 ))
          PGPASSWORD="$$(cat /run/secrets/db_password)"
          FILE="/backups/ovd-$$(date +%Y%m%d-%H%M).sql.gz"
          pg_dump -h postgres -U ovd_prod ovd_prod | gzip > "$$FILE"
          echo "[backup] $$FILE generado ($$(du -sh $$FILE | cut -f1))"
          ls -t /backups/ovd-*.sql.gz | tail -n +31 | xargs -r rm --
          sleep 86400
        done
      '
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.25"

secrets:
  anthropic_api_key:
    external: true
  db_password:
    external: true
  ovd_engine_secret:
    external: true
  openai_api_key:
    external: true

volumes:
  postgres_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local
  backup_data:
    driver: local

networks:
  ovd-internal:
    name: ovd-prod-network
    driver: bridge
