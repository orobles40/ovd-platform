# OVD Platform — Docker Compose
# Copyright 2026 Omar Robles
#
# Levanta toda la infraestructura de desarrollo local.
# Uso: docker compose up -d
#
# Servicios:
#   postgres      — PostgreSQL 16 + pgvector (base de datos principal)
#   nats          — NATS JetStream (mensajeria asincronica)
#   otel          — OpenTelemetry Collector (telemetria)
#   infisical-db  — PostgreSQL dedicado para Infisical (aislado de OVD DB)
#   infisical-redis — Redis requerido por Infisical
#   infisical     — Gestor de secrets auto-hosteado (Sprint 9 — GAP-A4)
#   ovd-engine    — OVD Engine (LangGraph/Python) — requiere imagen local
#   mcp-oracle    — MCP Server Oracle multi-sede — requiere imagen local

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL 16 + pgvector
  # ---------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ovd-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ovd_dev
      POSTGRES_USER: ovd_dev
      POSTGRES_PASSWORD: changeme
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ovd_dev -d ovd_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # NATS JetStream
  # ---------------------------------------------------------------------------
  nats:
    image: nats:2.10-alpine
    container_name: ovd-nats
    restart: unless-stopped
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"   # cliente
      - "8222:8222"   # monitoreo HTTP
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # OpenTelemetry Collector
  # ---------------------------------------------------------------------------
  otel:
    image: otel/opentelemetry-collector-contrib:0.96.0
    container_name: ovd-otel
    restart: unless-stopped
    command: ["--config=/etc/otel/config.yaml"]
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8888:8888"   # metricas del collector
    volumes:
      - ./infra/otel/config.yaml:/etc/otel/config.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:13133/"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Infisical — Gestor de secrets auto-hosteado (Sprint 9 — GAP-A4)
  #
  # Arquitectura:
  #   - infisical-db:    PostgreSQL dedicado para datos de Infisical (aislado de OVD DB)
  #   - infisical-redis: Redis para caché de sesiones y jobs de Infisical
  #   - infisical:       App Infisical en puerto 8080
  #
  # Setup inicial (primera vez):
  #   1. docker compose up -d infisical
  #   2. Abrir http://localhost:8080 y crear cuenta admin
  #   3. Crear proyecto "ovd-platform"
  #   4. Crear un environment por workspace: "alemana-cas", "alemana-cat", "alemana-cav"
  #   5. En cada environment, crear los secrets: ORACLE_HOST, ORACLE_USER, ORACLE_PASS, etc.
  #   6. Crear un Machine Identity (o Service Token) con acceso a "ovd-platform"
  #   7. Copiar el token → agregar como INFISICAL_TOKEN en .env del engine
  #
  # Variables de entorno requeridas (generar con: openssl rand -hex 32):
  #   INFISICAL_ENCRYPTION_KEY  — clave de cifrado de secrets en reposo
  #   INFISICAL_AUTH_SECRET     — secret para JWT de sesiones de Infisical
  # ---------------------------------------------------------------------------
  infisical-db:
    image: postgres:16-alpine
    container_name: ovd-infisical-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: infisical
      POSTGRES_USER: infisical
      POSTGRES_PASSWORD: ${INFISICAL_DB_PASSWORD:-infisical_dev}
    volumes:
      - infisical_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U infisical -d infisical"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - infisical

  infisical-redis:
    image: redis:7-alpine
    container_name: ovd-infisical-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - infisical_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - infisical

  infisical:
    image: infisical/infisical:latest-postgres
    container_name: ovd-infisical
    restart: unless-stopped
    environment:
      # Base de datos dedicada para Infisical
      DB_CONNECTION_URI: postgresql://infisical:${INFISICAL_DB_PASSWORD:-infisical_dev}@infisical-db:5432/infisical
      # Redis para sesiones y jobs
      REDIS_URL: redis://infisical-redis:6379
      # Claves de cifrado (REQUERIDAS — generar con: openssl rand -hex 32)
      ENCRYPTION_KEY: ${INFISICAL_ENCRYPTION_KEY:-changeme32charsminimumrequired!}
      AUTH_SECRET: ${INFISICAL_AUTH_SECRET:-changeme32charsminimumrequired!}
      # URL pública del servicio (para emails y redirects)
      SITE_URL: ${INFISICAL_SITE_URL:-http://localhost:8080}
      # SMTP opcional — si no está configurado, no envía emails de invitación
      SMTP_HOST: ${INFISICAL_SMTP_HOST:-}
      SMTP_PORT: ${INFISICAL_SMTP_PORT:-587}
      SMTP_USERNAME: ${INFISICAL_SMTP_USERNAME:-}
      SMTP_PASSWORD: ${INFISICAL_SMTP_PASSWORD:-}
      SMTP_FROM_ADDRESS: ${INFISICAL_SMTP_FROM:-noreply@localhost}
      SMTP_FROM_NAME: OVD Platform
    ports:
      - "8080:8080"
    depends_on:
      infisical-db:
        condition: service_healthy
      infisical-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/api/status"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    profiles:
      - infisical   # activar con: docker compose --profile infisical up -d

  # ---------------------------------------------------------------------------
  # Ollama — servidor LLM local (opcional, para modelos OSS sin API externa)
  #
  # Con GPU NVIDIA:
  #   docker compose --profile ollama up
  # Sin GPU (CPU):
  #   OVD_OLLAMA_RUNTIME=cpu docker compose --profile ollama up
  #
  # Modelos a descargar después de levantar:
  #   docker exec -it ovd-ollama ollama pull qwen2.5-coder:7b
  #   docker exec -it ovd-ollama ollama pull nomic-embed-text
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: ovd-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_HOST: 0.0.0.0
    # GPU NVIDIA — requiere nvidia-container-toolkit instalado en el host.
    # Para CPU, comentar el bloque 'deploy' completo o usar profile separado.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    profiles:
      - ollama   # activar con: docker compose --profile ollama up

  # ---------------------------------------------------------------------------
  # OVD Engine (LangGraph + Python)
  # Build local — requiere: cd src/engine && docker build -t ovd-engine .
  # ---------------------------------------------------------------------------
  ovd-engine:
    image: ovd-engine:latest
    container_name: ovd-engine
    restart: unless-stopped
    build:
      context: ./src/engine
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://ovd_dev:changeme@postgres:5432/ovd_dev
      NATS_URL: nats://nats:4222
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel:4318
      OTEL_SERVICE_NAME: ovd-engine
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OVD_ENGINE_SECRET: ${OVD_ENGINE_SECRET:-}
      OVD_MODEL: ${OVD_MODEL:-claude-sonnet-4-6}
      # Ollama — apuntar al servicio ollama del compose (si está activo)
      # o a http://host.docker.internal:11434 si Ollama corre en el host (Mac/Win).
      # En Linux con Ollama en host: usar http://172.17.0.1:11434
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ovd-ollama:11434}
      OVD_MODEL_ANALYZER: ${OVD_MODEL_ANALYZER:-}
      OVD_MODEL_SDD: ${OVD_MODEL_SDD:-}
      OVD_MODEL_QA: ${OVD_MODEL_QA:-}
      OVD_LLM_TIMEOUT_SECS: ${OVD_LLM_TIMEOUT_SECS:-300}
      PORT: "8001"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NODE_ENV: ${NODE_ENV:-production}
      # LangSmith tracing (GAP-010) — activar con LANGCHAIN_TRACING_V2=true
      LANGCHAIN_TRACING_V2: ${LANGCHAIN_TRACING_V2:-false}
      LANGCHAIN_API_KEY: ${LANGCHAIN_API_KEY:-}
      LANGCHAIN_PROJECT: ${LANGCHAIN_PROJECT:-ovd-platform}
      LANGCHAIN_ENDPOINT: ${LANGCHAIN_ENDPOINT:-https://api.smith.langchain.com}
      # Infisical — gestión de secrets por workspace (Sprint 9 — GAP-A4)
      # INFISICAL_TOKEN: Machine Identity token con acceso al proyecto "ovd-platform"
      # Generarlo en http://localhost:8080 → Settings → Machine Identities
      INFISICAL_URL: ${INFISICAL_URL:-http://infisical:8080}
      INFISICAL_TOKEN: ${INFISICAL_TOKEN:-}
      INFISICAL_PROJECT_ID: ${INFISICAL_PROJECT_ID:-}  # ID del proyecto "ovd-platform" en Infisical
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    profiles:
      - ovd   # activar con: docker compose --profile ovd up

  # ---------------------------------------------------------------------------
  # OVD Dashboard (React + Vite — S12)
  # Build local — requiere: cd src/dashboard && bun build
  # En desarrollo usar: cd src/dashboard && bun dev (puerto 5173, con HMR)
  # ---------------------------------------------------------------------------
  ovd-dashboard:
    image: ovd-dashboard:latest
    container_name: ovd-dashboard
    restart: unless-stopped
    build:
      context: ./src/dashboard
      dockerfile: Dockerfile
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8001}
    ports:
      - "5173:80"
    depends_on:
      ovd-engine:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    profiles:
      - ovd   # se levanta junto con el engine

  # ---------------------------------------------------------------------------
  # MCP Oracle multi-sede
  # Build local — requiere: cd src/mcp/oracle && docker build -t mcp-oracle .
  # ---------------------------------------------------------------------------
  mcp-oracle:
    image: mcp-oracle:latest
    container_name: ovd-mcp-oracle
    restart: unless-stopped
    build:
      context: ./src/mcp/oracle
      dockerfile: Dockerfile
    environment:
      ORACLE_WALLET_DIR: /oracle/wallets
      ORACLE_CAS_DSN: ${ORACLE_CAS_DSN}
      ORACLE_CAS_USER: ${ORACLE_CAS_USER}
      ORACLE_CAS_PASSWORD: ${ORACLE_CAS_PASSWORD}
      ORACLE_CAT_DSN: ${ORACLE_CAT_DSN}
      ORACLE_CAT_USER: ${ORACLE_CAT_USER}
      ORACLE_CAT_PASSWORD: ${ORACLE_CAT_PASSWORD}
      ORACLE_CAV_DSN: ${ORACLE_CAV_DSN}
      ORACLE_CAV_USER: ${ORACLE_CAV_USER}
      ORACLE_CAV_PASSWORD: ${ORACLE_CAV_PASSWORD}
      ORACLE_POOL_MIN: ${ORACLE_POOL_MIN:-2}
      ORACLE_POOL_MAX: ${ORACLE_POOL_MAX:-10}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel:4318
    volumes:
      - ${ORACLE_WALLET_DIR:-/opt/oracle/wallets}:/oracle/wallets:ro
    ports:
      - "8002:8002"   # HTTP wrapper para health check
    depends_on:
      otel:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 45s
    profiles:
      - oracle   # activar con: docker compose --profile oracle up

volumes:
  postgres_data:
    driver: local
  nats_data:
    driver: local
  ollama_data:
    driver: local
  infisical_db_data:
    driver: local
  infisical_redis_data:
    driver: local

networks:
  default:
    name: ovd-network
